<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Code Viewer with Scrollbars</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-y: auto;
        }
        textarea {
            width: 80%;
            height: 200px;
            margin: 20px 0;
            background-color: #252526;
            color: #d4d4d4;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 14px;
            padding: 10px;
        }
        button {
            background-color: #007acc;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background-color: #005a9e;
        }
        iframe {
            width: 80%;
            height: 400px;
            border: 1px solid #333;
            background-color: #fff;
            overflow: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>HTML Code Viewer with Scrollbars</h1>
    <textarea id="htmlInput" placeholder="Paste your HTML code here..."></textarea>
    <div>
        <button onclick="renderHTML()">Render</button>
        <button onclick="downloadAsPNG()">Download as PNG</button>
        <button onclick="copyImageToClipboard()">Copy Image to Clipboard</button>
    </div>
    <iframe id="outputFrame" scrolling="yes"></iframe>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        function renderHTML() {
            const htmlCode = document.getElementById("htmlInput").value;
            const iframe = document.getElementById("outputFrame");
            iframe.srcdoc = htmlCode;
        }

        function downloadAsPNG() {
            const iframe = document.getElementById("outputFrame");
            const iframeDoc = iframe.contentWindow.document.documentElement;

            html2canvas(iframeDoc).then((canvas) => {
                const link = document.createElement("a");
                link.download = "output.png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            }).catch((error) => {
                alert("An error occurred while capturing the image: " + error);
            });
        }

        async function copyImageToClipboard() {
            const iframe = document.getElementById("outputFrame");
            const iframeDoc = iframe.contentWindow.document.documentElement;

            try {
                const canvas = await html2canvas(iframeDoc);
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ "image/png": blob })
                        ]);
                        alert("Image copied to clipboard!");
                    } catch (err) {
                        alert("Clipboard write failed: " + err);
                    }
                });
            } catch (error) {
                alert("Error capturing image: " + error);
            }
        }
    </script>
</body>
</html>
